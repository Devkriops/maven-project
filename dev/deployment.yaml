apiVersion: apps/v1
kind: Deployment
metadata:
  name: harness-lab
  labels:
    app: harness-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: harness-lab
  template:
    metadata:
      labels:
        app: harness-lab
    spec:
      containers:
        - name: harness-lab
          image: us-central1-docker.pkg.dev/harness-lab-501205/maven-project-repo/maven-project:develop
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /hello
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /hello
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
