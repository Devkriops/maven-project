apiVersion: v1
kind: Service
metadata:
  name: harness-lab-stage
  labels:
    app: harness-lab
    environment: stage
spec:
  type: ClusterIP
  selector:
    app: harness-lab          # matches the pods (namespace isolates dev from stage)
  ports:
    - name: http
      port: 80
      targetPort: 8080
